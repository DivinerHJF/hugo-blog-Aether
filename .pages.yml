media:
  input: static/images
  output: /images

content:
  - name: posts
    label: Posts 文章
    type: collection
    path: content/posts
    format: yaml-frontmatter
    subfolders: true
    filename:
      template: "{year}/{year}{month}{day}.md"
      field: create
    view:
      fields: [title, date, categories, series, draft]
      primary: title
      sort: [date, title, categories]
      search: [title, description, categories, series, tags, body]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
        description: 文章标题；会作为后台列表主标题，也可用于生成文件名。
      - name: description
        label: 摘要 / SEO 描述
        type: text
        required: true
        description: 首页、列表页和搜索结果中显示的简短摘要，建议 40–120 字。
      - name: date
        label: 发布日期
        type: date
        required: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssxxx"
          step: 60
        description: 输出为 Hugo 可识别的带时区时间，例如 2025-09-15T21:53:53+08:00。
      - name: categories
        label: 分类
        type: select
        required: true
        options:
          multiple: true
          min: 1
          max: 1
          values:
            - 生活札记
            - 技术笔记
            - 博客折腾
            - 书影音
            - 行旅
        description: 当前主题文章通常只放 1 个分类；如需新增分类，可先在这里补充选项。
      - name: series
        label: 系列
        type: string
        list: true
        description: 可留空；常用如「夕拾花」「Hugo 博客折腾」「SQL 数据库笔记」「R 数据分析」「回归分析」。
      - name: tags
        label: 标签
        type: string
        list: true
        required: true
        description: 支持多个自由标签，例如：月记、生活、Hugo、SQL、R。
      - name: toc
        label: 显示目录
        type: boolean
        description: 长文、技术笔记建议开启；短札记或图文记录可关闭。
      - name: comment
        label: 开启评论
        type: boolean
        description: "旧文常用字段；开启后 front matter 写入 comment: true。"
      - name: math
        label: 启用数学公式
        type: boolean
        description: 只有包含 LaTeX / 数学公式的文章需要开启。
      - name: draft
        label: 草稿
        type: boolean
        description: 开启后 Hugo 默认不会发布，适合先在 CMS 中存草稿。
      - name: body
        label: 正文
        type: code
        options:
          format: markdown
        description: 使用 Markdown 源码编辑，能更稳妥保留 Hugo 短代码、HTML、代码块和已有文章格式；正文配图建议先用 R2 Image Uploader 处理后复制 Markdown 图片语法粘贴到这里。

  - name: data
    label: Data 数据
    type: group
    items:
      - name: books
        label: 书刊清单
        type: file
        path: data/books.yaml
        format: yaml
        fields:
          - name: "2026"
            label: 2026 书刊
            component: book_records
          - name: "2025"
            label: 2025 书刊
            component: book_records
          - name: "2024"
            label: 2024 书刊
            component: book_records
          - name: "2023"
            label: 2023 书刊
            component: book_records
          - name: "2022"
            label: 2022 书刊
            component: book_records

      - name: movies
        label: 影剧清单
        type: file
        path: data/movies.yaml
        format: yaml
        fields:
          - name: "2026"
            label: 2026 影剧
            component: movie_records
          - name: "2025"
            label: 2025 影剧
            component: movie_records
          - name: "2024"
            label: 2024 影剧
            component: movie_records
          - name: "2023"
            label: 2023 影剧
            component: movie_records
          - name: "2022"
            label: 2022 影剧
            component: movie_records

      - name: mental_links
        label: 精神食粮链接
        type: file
        path: data/mental_links.yaml
        format: yaml
        fields:
          - name: "2026"
            label: 2026 链接
            component: mental_link_records
          - name: "2025"
            label: 2025 链接
            component: mental_link_records
          - name: "2024"
            label: 2024 链接
            component: mental_link_records
          - name: "2023"
            label: 2023 链接
            component: mental_link_records
          - name: "2022"
            label: 2022 链接
            component: mental_link_records

      - name: footprint
        label: 足迹表格
        type: file
        path: data/footprint.yaml
        format: yaml
        fields:
          - name: travel
            label: 出游
            type: object
            fields:
              - name: "2026"
                label: 2026 出游
                component: footprint_year
              - name: "2025"
                label: 2025 出游
                component: footprint_year
              - name: "2024"
                label: 2024 出游
                component: footprint_year
              - name: "2023"
                label: 2023 出游
                component: footprint_year
          - name: reading
            label: 书影游
            type: object
            fields:
              - name: "2026"
                label: 2026 书影游
                component: footprint_year
              - name: "2025"
                label: 2025 书影游
                component: footprint_year
              - name: "2024"
                label: 2024 书影游
                component: footprint_year
              - name: "2023"
                label: 2023 书影游
                component: footprint_year
              - name: "2022"
                label: 2022 书影游
                component: footprint_year
          - name: poster
            label: 海报墙
            type: object
            fields:
              - name: "2026"
                label: 2026 海报墙
                component: footprint_year
              - name: "2025"
                label: 2025 海报墙
                component: footprint_year
              - name: "2024"
                label: 2024 海报墙
                component: footprint_year
              - name: "2023"
                label: 2023 海报墙
                component: footprint_year

components:
  book_records:
    type: object
    list:
      collapsible:
        collapsed: true
        summary: "{title} · {type}"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: coverurl
        label: 封面 URL
        type: string
        description: 可填写 NeoDB、豆瓣、起点或站内图片等完整图片地址。
      - name: link
        label: 条目链接
        type: string
        description: 作品详情页链接，可留空。
      - name: author
        label: 作者
        type: string
      - name: type
        label: 归档月份
        type: string
        required: true
        pattern:
          regex: "^[0-9]{2}-[0-9]{2}$"
          message: "请使用 YY-MM 格式，例如 25-09。"
        description: 页面按此前缀归入年份和月份，格式为 YY-MM。
      - name: starscore
        label: 评分星级
        type: string
        description: 已点亮星星，例如 ★★★★。
      - name: greystar
        label: 灰色星级
        type: string
        description: 未点亮星星，可留空，例如 ☆ 或 ☆☆。
      - name: intro
        label: 简评
        type: text

  movie_records:
    type: object
    list:
      collapsible:
        collapsed: true
        summary: "{title} · {type}"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: coverurl
        label: 封面 URL
        type: string
        description: 可填写 NeoDB、豆瓣、TMDB 或站内图片等完整图片地址。
      - name: link
        label: 条目链接
        type: string
        description: 作品详情页链接，可留空。
      - name: author
        label: 导演 / 主创
        type: string
      - name: type
        label: 归档月份
        type: string
        required: true
        pattern:
          regex: "^[0-9]{2}-[0-9]{2}$"
          message: "请使用 YY-MM 格式，例如 25-09。"
        description: 页面按此前缀归入年份和月份，格式为 YY-MM。
      - name: starscore
        label: 评分星级
        type: string
        description: 已点亮星星，例如 ★★★★。
      - name: greystar
        label: 灰色星级
        type: string
        description: 未点亮星星，可留空，例如 ☆ 或 ☆☆。
      - name: intro
        label: 简评
        type: text

  mental_link_records:
    type: object
    list:
      collapsible:
        collapsed: true
        summary: "{title} · {type}"
    fields:
      - name: type
        label: 归档月份
        type: string
        required: true
        pattern:
          regex: "^[0-9]{2}-[0-9]{2}$"
          message: "请使用 YY-MM 格式，例如 25-09。"
        description: 页面按此前缀归入年份和月份，格式为 YY-MM。
      - name: category
        label: 分类
        type: select
        required: true
        options:
          values:
            - 自媒体摘录
            - 文章
            - 视频
            - 播客 · 声音发掘
            - 播客 · 读书分享
            - 播客 · 技术编程
            - 播客 · 泛文讲谈
            - 播客 · 社论观察
            - 播客 · 商业分析
            - 播客 · 闲聊讨论
            - 其他 · RSS/Newsletter
            - 其他 · Bilibili
            - 其他 · Youtube
      - name: title
        label: 标题
        type: string
        required: true
      - name: url
        label: 链接
        type: string
        required: true
      - name: source
        label: 来源 / 作者
        type: string
        description: 可留空。

  footprint_year:
    type: object
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: rows
        label: 月份行
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{month}"
        fields:
          - name: month
            label: 月份
            type: select
            required: true
            options:
              values:
                - 一月
                - 二月
                - 三月
                - 四月
                - 五月
                - 六月
                - 七月
                - 八月
                - 九月
                - 十月
                - 十一月
                - 十二月
          - name: events
            label: 事件
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{city}：{activity}"
            fields:
              - name: city
                label: 城市 / 地点
                type: string
                required: true
              - name: activity
                label: 活动
                type: string
                required: true

settings:
  content:
    merge: true
