# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "Aether"
license = "MIT"
licenselink = "https://github.com/DivinerHJF/hugo-blog-Aether/blob/main/themes/aether/LICENSE"
description = "A self-use Hugo theme for philohao.com, adapted from DoIt."
homepage = "https://github.com/DivinerHJF/hugo-blog-Aether"
demosite = "https://philohao.com/"
tags = [
  "blog",
  "clean",
  "responsive",
  "dark",
  "theme"
]
features = [
  "cover-image",
  "favicon",
  "multilingual",
  "pagination",
  "social-menu",
  "syntax-highlighting",
  "SEO Optimized"
]

[author]
  name = "Jianfeng.Hao"
  homepage = "https://philohao.com/"

[original]
  name = "DoIt"
  homepage = "https://hugodoit.pages.dev/"
  repo = "https://github.com/HEIGE-PCloud/DoIt"
  author = "PCloud"
  note = "Aether is adapted from DoIt; upstream copyright and license notices are preserved."

[original.basedOn]
  name = "LoveIt"
  homepage = "https://dillonzq.com/"
  repo = "https://github.com/dillonzq/LoveIt/"
  author = "Dillon"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.83.0"
