[params]
#  DoIt 主题版本
version = "0.2.X"
# 网站名称
title = "灿若星河"
# 网站描述
description = "Personal website of JianFeng Hao | 郝建锋的个人网站"
# 网站关键词
keywords = ["blog", "Hugo", "郝建锋", "博客"]
#  网站默认主题样式 ("light", "dark", "black", "auto")
defaultTheme = "auto"
# 公共 git 仓库路径, 仅在 enableGitInfo 设为 true 时有效
enableGitInfo = true
[frontmatter]
  lastmod = [":git", ":fileModTime", "lastmod", ":defalut"]

gitRepo = ""
#  哪种哈希函数用来 SRI, 为空时表示不使用 SRI
# ("sha256", "sha384", "sha512", "md5")
fingerprint = "md5"
#  日期格式
dateFormat = "2006-01-02"
# 网站图片, 用于 Open Graph 和 Twitter Cards
images = ["/images/me/favicon.svg"]
#  开启PWA支持
enablePWA = true
#  应用图标配置
[params.app]
# 当添加到 iOS 主屏幕或者 Android 启动器时的标题, 覆盖默认标题
title = "Aether"
# 是否隐藏网站图标资源链接
noFavicon = false
# 更现代的 SVG 网站图标, 可替代旧的 .png 和 .ico 文件
svgFavicon = "/images/me/favicon.svg"
# Safari 图标颜色
iconColor = "#5bbad5"
# Windows v8-10磁贴颜色
tileColor = "#da532c"

#  搜索配置
[params.search]
enable = true
# 搜索引擎的类型 ("lunr", "algolia", "fuse")
type = "fuse"
# 文章内容最长索引长度
contentLength = 1000000
# 搜索框的占位提示语
placeholder = ""
#  最大结果数目
maxResultLength = 10
#  结果内容片段长度
snippetLength = 50
#  搜索结果中高亮部分的 HTML 标签
highlightTag = "em"
#  是否在搜索索引中使用基于 baseURL 的绝对路径
absoluteURL = false
[params.search.algolia]
appID = ""
index = ""
searchKey = ""
[params.search.fuse]
#  https://fusejs.io/api/options.html
findAllMatches = false
ignoreFieldNorm = false
isCaseSensitive = false
includeMatches = false
minMatchCharLength = 2
ignoreLocation = true
location = 0
threshold = 0.3
distance = 100
useExtendedSearch = false

# 页面头部导航栏配置
[params.header]
# 桌面端导航栏模式 ("fixed", "normal", "auto")
desktopMode = "auto"
# 移动端导航栏模式 ("fixed", "normal", "auto")
mobileMode = "auto"
#  主题切换模式
# 主题切换模式 ("switch", "select")
